<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juliana Meyer — Portfolio Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="design-canvas.jsx" type="text/babel"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0eee9; }

  /* Wireframe aesthetic */
  .wf { font-family: 'Caveat', cursive; }
  .mono { font-family: 'Space Mono', monospace; }

  /* Sketch box */
  .box {
    border: 2px solid #333;
    border-radius: 2px;
    background: #fff;
  }
  .box-fill { background: #e8e6e0; }
  .box-dark { background: #333; }
  .box-accent { background: #f5e6c8; border-color: #c8a05a; }
  .box-mid { background: #d4d0c8; }

  /* Hatched placeholder image */
  .img-ph {
    background: repeating-linear-gradient(
      45deg, #ddd, #ddd 1px, #f0eee9 1px, #f0eee9 8px
    );
    border: 2px solid #aaa;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px; color: #888; text-align: center;
  }

  .tag {
    display: inline-block;
    border: 1.5px solid #333;
    border-radius: 2px;
    padding: 2px 7px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    background: #fff;
  }
  .tag-filled {
    background: #333; color: #fff;
  }

  /* Red annotation line */
  .anno {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #c0392b;
    position: absolute;
  }

  .line-h { border-top: 1.5px solid #ccc; }
  .line-h-dark { border-top: 1.5px solid #666; }

  .squiggle {
    text-decoration: underline wavy #c0392b;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── Shared wireframe primitives ──────────────────────────────

const W = 420; // artboard width

// Rough nav bar
const Nav = ({ logo = "JM", links = ["Work", "About", "Contact"], dark }) => (
  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '10px 16px', borderBottom: '2px solid #333',
    background: dark ? '#333' : '#fff' }}>
    <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: dark ? '#fff' : '#333' }}>{logo}</span>
    <div style={{ display: 'flex', gap: 14 }}>
      {links.map(l => <span key={l} className="wf" style={{ fontSize: 13, color: dark ? '#ddd' : '#555' }}>{l}</span>)}
    </div>
  </div>
);

// Section label pill
const Label = ({ children, accent }) => (
  <span className="mono" style={{ fontSize: 8, letterSpacing: 1.5, textTransform: 'uppercase',
    borderBottom: `2px solid ${accent || '#333'}`, paddingBottom: 1, color: accent || '#333' }}>
    {children}
  </span>
);

// Metric block
const Metric = ({ num, label, w = 80 }) => (
  <div style={{ width: w, textAlign: 'center' }}>
    <div className="wf" style={{ fontSize: 26, fontWeight: 700, lineHeight: 1 }}>{num}</div>
    <div className="wf" style={{ fontSize: 11, color: '#666', marginTop: 2 }}>{label}</div>
  </div>
);

// Case study card
const CaseCard = ({ title, company, tag, metric, metricLabel, h = 80 }) => (
  <div className="box" style={{ padding: '10px 12px', height: h, position: 'relative' }}>
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
      <div>
        <div className="wf" style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>{title}</div>
        <div className="mono" style={{ fontSize: 8, color: '#888', marginTop: 3 }}>{company}</div>
      </div>
      {metric && <div style={{ textAlign: 'right', flexShrink: 0 }}>
        <div className="wf" style={{ fontSize: 18, fontWeight: 700, lineHeight: 1 }}>{metric}</div>
        <div className="wf" style={{ fontSize: 9, color: '#888' }}>{metricLabel}</div>
      </div>}
    </div>
    {tag && <span className="tag" style={{ position: 'absolute', bottom: 8, left: 12, fontSize: 8 }}>{tag}</span>}
  </div>
);

// ─── Layout A: Statement First ─────────────────────────────────
// Bold single-line hero → key metrics bar → featured case study → work grid

const LayoutA = () => (
  <div className="box" style={{ width: W, background: '#fff' }}>
    <Nav />
    {/* Hero: full-width statement */}
    <div style={{ padding: '32px 20px 20px', borderBottom: '2px solid #333' }}>
      <div className="wf" style={{ fontSize: 11, color: '#888', letterSpacing: 2, marginBottom: 8, fontFamily: 'Space Mono, monospace', textTransform: 'uppercase' }}>Senior PMM · iConnections · VTEX</div>

        I launch products.<br/>
        <span style={{ background: '#333', color: '#fff', padding: '0 4px' }}>The numbers follow.</span>
      </div>
      <div className="wf" style={{ fontSize: 14, color: '#555', marginTop: 12, maxWidth: 320 }}>
        GTM strategy for 40+ products. Tech PMM fluent in GitHub, positioning, and data.
      </div>
      <div style={{ marginTop: 16, display: 'flex', gap: 10 }}>
        <span className="tag tag-filled" style={{ fontSize: 10, padding: '4px 12px' }}>See my work ↓</span>
        <span className="tag" style={{ fontSize: 10, padding: '4px 12px' }}>Resume</span>
      </div>
    </div>

    {/* Metrics strip */}
    <div style={{ display: 'flex', justifyContent: 'space-around', padding: '16px 12px', borderBottom: '2px solid #333', background: '#f9f8f5' }}>
      <Metric num="40+" label="products launched" w={85} />
      <div style={{ width: 1, background: '#ddd' }} />
      <Metric num="5M+" label="reach in 30 days" w={85} />
      <div style={{ width: 1, background: '#ddd' }} />
      <Metric num="163%" label="of Q4 lead target" w={85} />
      <div style={{ width: 1, background: '#ddd' }} />
      <Metric num="61%" label="WAU baseline lift" w={85} />
    </div>

    {/* Featured case study */}
    <div style={{ padding: '20px 20px 0' }}>
      <Label>Featured work</Label>
      <div style={{ marginTop: 10, border: '2px solid #333', background: '#f9f8f5', padding: '14px 16px', position: 'relative' }}>
        <div className="mono" style={{ fontSize: 8, color: '#888', marginBottom: 4 }}>iCONNECTIONS · 2025–PRESENT</div>
        <div className="wf" style={{ fontSize: 20, fontWeight: 700 }}>Mobile Feed GTM</div>
        <div className="wf" style={{ fontSize: 12, color: '#555', marginTop: 4, maxWidth: 260 }}>Personalized LP homepage. Full GTM: 5 videos, 200+ content cards, 10 push notifs.</div>
        <div style={{ display: 'flex', gap: 16, marginTop: 12 }}>
          <div><div className="wf" style={{ fontSize: 22, fontWeight: 700 }}>7.2%</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>LP memberbase, day 1–35</div></div>
          <div><div className="wf" style={{ fontSize: 22, fontWeight: 700 }}>24%</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>reached at 5 months</div></div>
          <div><div className="wf" style={{ fontSize: 22, fontWeight: 700 }}>43K</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>feed session starts</div></div>
        </div>

        <span className="tag" style={{ marginTop: 10, display: 'inline-block', fontSize: 8 }}>Read case →</span>
      </div>
    </div>

    {/* Work grid 2-col */}
    <div style={{ padding: '16px 20px 0' }}>
      <Label>All work</Label>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
        <CaseCard title="VTEX Vision 17-Product Launch" company="VTEX · 2023–24" tag="Global GTM" metric="5M+" metricLabel="reach" />
        <CaseCard title="Allocator Pro Loyalty Tier" company="iConnections · 2026" tag="Product launch" metric="200" metricLabel="beta members" />
        <CaseCard title="WAU Growth Program" company="iConnections · 2025" tag="Lifecycle" metric="61%" metricLabel="WAU lift" />
        <CaseCard title="Re-engagement Experiment" company="iConnections · 2025" tag="Experiment" metric="25.9%" metricLabel="reactivated" />
        <CaseCard title="FastStore GTM" company="VTEX · 2023" tag="Dev GTM" />
        <CaseCard title="DevPortal Award Winner" company="VTEX · 2023" tag="🏆 Best Visual UI" />
      </div>
    </div>

    {/* Skills */}
    <div style={{ padding: '16px 20px 0' }}>
      <Label>Skills</Label>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
        {['GTM Strategy','Positioning','Lifecycle Emails','Sales Enablement','Developer Docs','Data Analysis','Product Launches','Content Strategy','Video Scripting','GitHub'].map(s => (
          <span key={s} className="tag" style={{ fontSize: 8 }}>{s}</span>
        ))}
      </div>
    </div>

    {/* Contact CTA */}
    <div style={{ margin: '20px 20px 20px', border: '2px solid #333', padding: '16px', textAlign: 'center' }}>
      <div className="wf" style={{ fontSize: 18, fontWeight: 700 }}>Let's talk.</div>
      <div className="wf" style={{ fontSize: 12, color: '#666', marginTop: 4 }}>Open to senior PMM roles in tech.</div>
      <div className="tag tag-filled" style={{ display: 'inline-block', marginTop: 10, fontSize: 10, padding: '5px 16px', cursor: 'pointer' }}>juliana@email.com →</div>
    </div>
  </div>
);

// ─── Layout B: Case Study Deep Dive ────────────────────────────

      <div>
        <div className="wf" style={{ fontSize: 28, fontWeight: 700, lineHeight: 1.1 }}>Juliana Meyer</div>
        <div className="wf" style={{ fontSize: 14, color: '#666', marginTop: 4 }}>Senior Product Marketing Manager</div>
        <div className="wf" style={{ fontSize: 12, color: '#999', marginTop: 2 }}>iConnections · VTEX · 40+ products</div>
      </div>
      <div className="img-ph" style={{ width: 64, height: 64, borderRadius: '50%', flexShrink: 0, fontSize: 8, background: '#ddd' }}>photo</div>
    </div>

    {/* Tabs */}
    <div style={{ display: 'flex', borderBottom: '2px solid #333', background: '#fff' }}>
      {['Work', 'Skills', 'About'].map((t, i) => (
        <div key={t} className="wf" style={{
          padding: '8px 18px', fontSize: 13, fontWeight: i === 0 ? 700 : 400,
          borderRight: '1.5px solid #ddd',
          borderBottom: i === 0 ? '3px solid #333' : 'none',
          marginBottom: i === 0 ? -2 : 0
        }}>{t}</div>
      ))}
    </div>

    {/* Case studies — editorial tall cards */}
    <div style={{ padding: '16px 16px 0' }}>
      <Label>Selected work</Label>

      {/* Card 1: big feature */}
      <div style={{ marginTop: 10, border: '2px solid #333', background: '#fff' }}>
        <div className="img-ph" style={{ height: 100, borderBottom: '2px solid #333' }}>campaign screenshot / visual</div>
        <div style={{ padding: '12px 14px' }}>
          <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
            <span className="tag tag-filled" style={{ fontSize: 7 }}>iConnections</span>
            <span className="tag" style={{ fontSize: 7 }}>Mobile · GTM</span>
          </div>
          <div className="wf" style={{ fontSize: 18, fontWeight: 700, lineHeight: 1.15 }}>Mobile Feed: Personalized LP Homepage</div>
          <div className="wf" style={{ fontSize: 11, color: '#666', marginTop: 6 }}>Full-funnel GTM for a social-style mobile experience. 200+ content cards, 5 videos, 10 push notifs.</div>
          <div style={{ display: 'flex', gap: 12, marginTop: 10, paddingTop: 10, borderTop: '1.5px solid #eee' }}>
            <div><div className="wf" style={{ fontSize: 18, fontWeight: 700 }}>24%</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>LP memberbase @ 5mo</div></div>
            <div><div className="wf" style={{ fontSize: 18, fontWeight: 700 }}>43K</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>feed sessions</div></div>
            <div><div className="wf" style={{ fontSize: 18, fontWeight: 700 }}>4.9K</div><div className="wf" style={{ fontSize: 9, color: '#888' }}>starts in 35 days</div></div>
          </div>
        </div>
      </div>

      {/* Card 2 */}
      <div style={{ marginTop: 10, border: '2px solid #333', background: '#fff', padding: '12px 14px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div style={{ flex: 1, marginRight: 10 }}>
            <div style={{ display: 'flex', gap: 5, marginBottom: 6 }}>
              <span className="tag tag-filled" style={{ fontSize: 7 }}>VTEX</span>
              <span className="tag" style={{ fontSize: 7 }}>Global Launch</span>
              <span className="tag" style={{ fontSize: 7, background: '#f5e6c8', borderColor: '#c8a05a' }}>🏅 Awwwards</span>
            </div>
            <div className="wf" style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.2 }}>VTEX Vision — 17 Products, 1 Campaign</div>
            <div className="wf" style={{ fontSize: 11, color: '#666', marginTop: 5 }}>First-ever semiannual global product launch. 15+ teams. 5M+ reach in 30 days.</div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div className="wf" style={{ fontSize: 22, fontWeight: 700 }}>5M+</div>
            <div className="wf" style={{ fontSize: 9, color: '#888' }}>reach</div>
          </div>
        </div>
      </div>

      {/* Card 3 */}
      <div style={{ marginTop: 10, border: '2px solid #333', background: '#fff', padding: '12px 14px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div style={{ flex: 1, marginRight: 10 }}>
            <div style={{ display: 'flex', gap: 5, marginBottom: 6 }}>
              <span className="tag tag-filled" style={{ fontSize: 7 }}>iConnections</span>
              <span className="tag" style={{ fontSize: 7 }}>Platform Adoption</span>
            </div>
            <div className="wf" style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.2 }}>Platform Engagement & WAU Growth</div>
            <div className="wf" style={{ fontSize: 11, color: '#666', marginTop: 5 }}>Onboarding emails, push notifs, in-app tours, 2-mo sales enablement program.</div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div className="wf" style={{ fontSize: 22, fontWeight: 700 }}>19x</div>
            <div className="wf" style={{ fontSize: 9, color: '#888' }}>subscriber WAU</div>
          </div>
        </div>
      </div>

      {/* More work collapsed */}
      <div className="wf" style={{ textAlign: 'center', padding: '12px', fontSize: 13, color: '#888', cursor: 'pointer' }}>+ 5 more projects ↓</div>
    </div>

    {/* Skills inline */}
    <div style={{ padding: '0 16px' }}>
      <div className="line-h" />
      <div style={{ padding: '14px 0' }}>
        <Label>Skills & tools</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginTop: 8 }}>
          {[['GTM Strategy','●●●●●'],['Positioning','●●●●●'],['Sales Enablement','●●●●○'],['Developer Docs','●●●●●'],['HubSpot / Intercom','●●●●○'],['GitHub / Markdown','●●●●●']].map(([s, r]) => (

    {/* Contact */}

      </div>
      <span className="tag" style={{ background: '#fff', color: '#333', fontSize: 9, padding: '5px 12px' }}>Get in touch →</span>
    </div>

// ─── Layout C: Left Anchor / Side Nav ──────────────────────────
// Split layout: sticky left column with identity + nav, right scrolls case studies

  <div className="box" style={{ width: W, background: '#fff', minHeight: 900 }}>
    <div style={{ display: 'flex', height: '100%' }}>

      {/* LEFT COLUMN — identity + nav */}
      <div style={{ width: 130, borderRight: '2px solid #333', padding: '24px 14px', flexShrink: 0, background: '#f9f8f5', display: 'flex', flexDirection: 'column', gap: 0 }}>

        {/* Intro line */}
        <div className="wf" style={{ fontSize: 12, color: '#888', marginBottom: 14 }}>GTM strategy for 40+ products · Tech PMM fluent in GitHub and positioning</div>

        {/* Highlight metrics row */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {[['5M+','reach in 30d'],['163%','of lead target'],['61%','WAU lift'],['19x','subscriber growth']].map(([n, l]) => (

            </div>

        ))}

        {/* Skills quick */}
        <div style={{ marginTop: 12, borderTop: '2px solid #333', paddingTop: 12 }}>
          <Label>Core skills</Label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginTop: 8 }}>
            {['GTM Strategy','Positioning','Lifecycle','Sales Enablement','Developer PMM','Data Analysis','Content Strategy','GitHub'].map(s => (
              <span key={s} className="tag" style={{ fontSize: 8 }}>{s}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  </div>
);
