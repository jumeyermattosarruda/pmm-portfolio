    solution: 'Browser-based gallery wall planner. AI-assisted dev. Upload photos, remove backgrounds, drag layouts.',

const TIMELINE = [
  { co: 'iConnections', role: 'Senior PMM', start: 2025, end: 'now', current: true },
  { co: 'VTEX', role: 'Global PMM', start: 2023, end: 2025 },

const SKILLS = ['GTM Strategy','Positioning','Lifecycle Comms','Sales Enablement','Developer PMM','Data Analysis','Video Scripting','Content Strategy','GitHub','HubSpot','Intercom','Pendo','Salesforce','Looker','PowerBI','Figma','Notion','OpenAPI/Swagger'];

// ─── Primitives ───────────────────────────────────────────────

const SectionLabel = ({ children, color = '#333' }) => (
  <span className="mono" style={{ fontSize: 8, letterSpacing: 2, textTransform: 'uppercase', borderBottom: `2px solid ${color}`, paddingBottom: 1, color }}>

);

const LinkedInBtn = ({ style = {}, dark, sm }) => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    background: dark ? '#fff' : '#333', color: dark ? '#333' : '#fff',
    border: '2px solid #333', padding: sm ? '5px 10px' : '7px 14px', cursor: 'pointer',
    fontFamily: 'Space Mono, monospace', fontSize: sm ? 9 : 10, fontWeight: 700,
    borderRadius: 2, ...style
  }}>
    <svg width={sm ? 10 : 12} height={sm ? 10 : 12} viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
    Connect on LinkedIn
  </div>
);

// Photo slideshow — 3 circular dots show as indicators
const PhotoSlideshow = ({ size = 88, photos = ['photo 1','photo 2','photo 3'] }) => {
  const [i, setI] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % photos.length), 2400);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <div className="photo-ph" style={{
        width: size, height: size, borderRadius: '50%',
      }}>
        {photos[i]}
      </div>
      {/* tiny indicator dots */}
      <div style={{ position: 'absolute', bottom: -10, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: 4 }}>
        {photos.map((_, n) => (
          <div key={n} style={{ width: 5, height: 5, borderRadius: 3, background: n === i ? '#333' : '#ccc' }} />
        ))}
      </div>
    </div>
  );
};

// Integrated timeline: company + role above the line, years below.
// Each segment is a labeled span on the line itself.
const HorizontalTimeline = ({ dark }) => {
  const minY = 2019;
  const maxY = 2026.4;
  const span = maxY - minY;
  const pos = (y) => ((y - minY) / span) * 100;
  return (
    <div style={{ width: '100%', paddingTop: 36, paddingBottom: 22, position: 'relative' }}>
      {/* track + segments */}
      <div style={{ position: 'relative', height: 6, background: dark ? '#333' : '#ece8df', borderRadius: 3 }}>
        {TIMELINE.map((t, i) => {
          const start = pos(t.start);
          const end = pos(t.end === 'now' ? 2026.4 : t.end);
          const width = end - start;
          const segColor = t.current ? '#c8a05a' : (dark ? '#bbb' : '#333');
          return (
            <React.Fragment key={i}>
              {/* segment bar */}
              <div style={{
                position: 'absolute', left: `${start}%`, width: `${width}%`,
                height: 6, background: segColor, borderRadius: 3,
              }} />
              {/* labels above the line */}
              <div style={{
                position: 'absolute', left: `${start + width / 2}%`, bottom: 'calc(100% + 6px)',
                transform: 'translateX(-50%)', textAlign: 'center', whiteSpace: 'nowrap',
              }}>
                <div className="mono" style={{ fontSize: 7, fontWeight: 700, letterSpacing: 0.5, color: dark ? '#fff' : '#333', textTransform: 'uppercase' }}>{t.co}</div>
                <div className="wf" style={{ fontSize: 11, color: dark ? '#ccc' : '#666', lineHeight: 1.1 }}>{t.role}</div>
              </div>
              {/* start year tick below */}
              <div style={{
                position: 'absolute', left: `${start}%`, top: 'calc(100% + 6px)',
                transform: 'translateX(-50%)',
                fontFamily: 'Space Mono, monospace', fontSize: 8,
                color: dark ? '#888' : '#aaa',
              }}>{t.start}</div>
              {/* segment dot */}
              <div style={{
                position: 'absolute', left: `${start}%`, top: '50%',
                transform: 'translate(-50%, -50%)',
                width: 8, height: 8, borderRadius: '50%',
                background: segColor, border: `2px solid ${dark ? '#1a1a1a' : '#fff'}`,
              }} />
            </React.Fragment>
          );
        })}
        {/* end "now" marker */}
        <div style={{
          position: 'absolute', left: '100%', top: 'calc(100% + 6px)',
          transform: 'translateX(-50%)',
          fontFamily: 'Space Mono, monospace', fontSize: 8, fontWeight: 700,
          color: '#c8a05a',
        }}>now</div>
        <div style={{
          position: 'absolute', left: '100%', top: '50%',
          transform: 'translate(-50%, -50%)',
          width: 10, height: 10, borderRadius: '50%',
          background: '#c8a05a', border: `2px solid ${dark ? '#1a1a1a' : '#fff'}`,
          boxShadow: '0 0 0 2px #c8a05a44',
        }} />
      </div>
    </div>
  );
};

// Project card — image-top with explicit "View case →" CTA
const ProjectCard = ({ project, onOpen }) => (
  <div onClick={() => onOpen(project)} style={{
    border: '2px solid #333', background: '#fff', cursor: 'pointer',
    overflow: 'hidden', position: 'relative', transition: 'transform 0.15s, box-shadow 0.15s',
  }}
    onMouseEnter={e => {
      e.currentTarget.style.transform = 'translateY(-2px)';
      e.currentTarget.style.boxShadow = '4px 4px 0 #333';
    }}
    onMouseLeave={e => {
      e.currentTarget.style.transform = '';
      e.currentTarget.style.boxShadow = '';
    }}
  >
    <div className="img-ph" style={{ height: 100, borderBottom: '2px solid #bbb', borderRadius: 0, position: 'relative' }}>
      {project.imgLabel}
      {/* minimal expand icon — transparent over image */}
      <div style={{
        position: 'absolute', top: 6, right: 6,
        width: 18, height: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.4)',
        fontFamily: 'Space Mono, monospace', fontSize: 13, fontWeight: 700, lineHeight: 1,
      }}>↗</div>
    </div>
    <div style={{ padding: '10px 12px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
        <div style={{ minWidth: 0 }}>
          <div className="wf" style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.2 }}>{project.title}</div>
          <div className="mono" style={{ fontSize: 7, color: '#888', marginTop: 2 }}>{project.company} · {project.year}</div>
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div className="wf" style={{ fontSize: 17, fontWeight: 700, lineHeight: 1 }}>{project.metric}</div>
          <div className="wf" style={{ fontSize: 8, color: '#888', lineHeight: 1.2, maxWidth: 90 }}>{project.metricLabel}</div>
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, paddingTop: 8, borderTop: '1px dashed #ddd' }}>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {project.tags.slice(0, 2).map(t => <span key={t} className="tag" style={{ fontSize: 7 }}>{t}</span>)}
          {project.award && <span className="tag tag-award" style={{ fontSize: 7 }}>{project.award}</span>}
        </div>
        <span className="wf" style={{ fontSize: 11, fontWeight: 700, color: '#c8a05a' }}>Read case →</span>
      </div>
    </div>
  </div>
);

// Modal
const Modal = ({ project, onClose }) => {
  if (!project) return null;
  return (
    <div onClick={onClose} style={{
      position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.55)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: 20,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', border: '2px solid #333', width: '100%', maxWidth: 400,
        maxHeight: '85%', overflow: 'auto',
      }}>
        <div className="img-ph" style={{ height: 140, borderBottom: '2px solid #bbb', borderRadius: 0, fontSize: 10 }}>
          {project.imgLabel}
        </div>
        <div style={{ padding: '14px 16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
            <div>
              <div className="wf" style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.15 }}>{project.title}</div>
              <div className="mono" style={{ fontSize: 8, color: '#888', marginTop: 3 }}>{project.company} · {project.year}</div>
            </div>
            <button onClick={onClose} style={{ border: '2px solid #333', background: '#fff', cursor: 'pointer', width: 24, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontFamily: 'monospace', flexShrink: 0 }}>×</button>
          </div>
          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 12 }}>
            {project.tags.map(t => <span key={t} className="tag" style={{ fontSize: 7 }}>{t}</span>)}
            {project.award && <span className="tag tag-award" style={{ fontSize: 7 }}>{project.award}</span>}
          </div>
          {[['Problem', project.problem], ['Solution', project.solution]].map(([h, b]) => (
            <div key={h} style={{ marginBottom: 10 }}>
              <div className="mono" style={{ fontSize: 8, letterSpacing: 1, textTransform: 'uppercase', color: '#888', marginBottom: 4 }}>{h}</div>
              <div className="wf" style={{ fontSize: 13, lineHeight: 1.4, color: '#333' }}>{b}</div>
            </div>
          ))}
          <div style={{ borderTop: '1.5px solid #eee', paddingTop: 10, marginTop: 4 }}>
            <div className="mono" style={{ fontSize: 8, letterSpacing: 1, textTransform: 'uppercase', color: '#888', marginBottom: 6 }}>Outcomes</div>
            {project.outcomes.map((o, i) => (
              <div key={i} style={{ display: 'flex', gap: 6, marginBottom: 4 }}>
                <span className="wf" style={{ fontSize: 13, color: '#c8a05a', fontWeight: 700, flexShrink: 0 }}>→</span>
                <span className="wf" style={{ fontSize: 13 }}>{o}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// About section — shared across layouts, optional dark variant
const AboutSection = ({ dark }) => (

    <div style={{ flex: 1 }}>

      </div>
      <div className="wf" style={{ fontSize: 13, lineHeight: 1.4, color: dark ? '#aaa' : '#666', marginTop: 8 }}>
        Background in technical writing means I'm fluent in GitHub, OpenAPI, and developer audiences. Outside work: co-founder of Tech Writing BR (300+ members), co-host of the Manu&lt;script&gt; podcast (30+ episodes, guests in 7+ countries).
      </div>
    </div>
    <div style={{ width: 90, flexShrink: 0, paddingTop: 12 }}>
      <PhotoSlideshow size={86} photos={['working','speaking','team']} />
    </div>
  </div>
);

// ─── Layout A: Minimalist ─────────────────────────────────────

      {/* Contact footer */}

        <div className="wf" style={{ fontSize: 18, color: '#333', fontWeight: 700, marginBottom: 4 }}>Let's connect.</div>

// Sub-band: dark "by-the-numbers" stat strip.
// Work: 2-col grid (no carousel).
// Career timeline + About + Skills + Contact.

const LayoutEditorial = () => {
  const [active, setActive] = React.useState(null);
  return (
    <div style={{ width: W, background: '#faf8f3', position: 'relative' }}>
      {/* Nav */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 22px', borderBottom: '2px solid #333' }}>
