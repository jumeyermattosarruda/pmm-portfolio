// ─── Primitives ───────────────────────────────────────────────

const SectionLabel = ({ children, color = '#333' }) => (
  <span className="mono" style={{ fontSize: 8, letterSpacing: 2, textTransform: 'uppercase', borderBottom: `2px solid ${color}`, paddingBottom: 1, color }}>
    {children}
  </span>
);

const LinkedInBtn = ({ style = {}, dark }) => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    background: dark ? '#fff' : '#333', color: dark ? '#333' : '#fff',
    border: '2px solid #333', padding: '7px 14px', cursor: 'pointer',
    fontFamily: 'Space Mono, monospace', fontSize: 10, fontWeight: 700,
    borderRadius: 2, ...style
  }}>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
    Connect on LinkedIn
  </div>
);

// Project card with click-to-open modal
const ProjectCard = ({ project, onOpen, variant = 'default' }) => {
  const imgH = Math.round(W * 0.5 * project.imgAspect * 0.7);

  if (variant === 'image-top') {
    return (
      <div onClick={() => onOpen(project)} style={{
        border: '2px solid #333', background: '#fff', cursor: 'pointer',
        transition: 'transform 0.15s',
      }}
        onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
        onMouseLeave={e => e.currentTarget.style.transform = ''}
      >
        <div className="img-ph" style={{ height: imgH, borderBottom: '2px solid #bbb', borderRadius: 0 }}>
          {project.imgLabel}
        </div>
        <div style={{ padding: '10px 12px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
            <div>
              <div className="wf" style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.2 }}>{project.title}</div>
              <div className="mono" style={{ fontSize: 7, color: '#888', marginTop: 2 }}>{project.company} · {project.year}</div>
            </div>
            <div style={{ textAlign: 'right', flexShrink: 0 }}>
              <div className="wf" style={{ fontSize: 18, fontWeight: 700, lineHeight: 1 }}>{project.metric}</div>
              <div className="wf" style={{ fontSize: 9, color: '#888', lineHeight: 1.2 }}>{project.metricLabel}</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 4, marginTop: 8, flexWrap: 'wrap' }}>
            {project.tags.map(t => <span key={t} className="tag" style={{ fontSize: 7 }}>{t}</span>)}
            {project.award && <span className="tag tag-award" style={{ fontSize: 7 }}>{project.award}</span>}
          </div>
        </div>
      </div>
    );
  }

  if (variant === 'horizontal') {
    return (
      <div onClick={() => onOpen(project)} style={{
        border: '2px solid #333', background: '#fff', cursor: 'pointer',
        display: 'flex', height: 90,
      }}
        onMouseEnter={e => e.currentTarget.style.background = '#f9f8f5'}
        onMouseLeave={e => e.currentTarget.style.background = '#fff'}
      >
        <div className="img-ph" style={{ width: 120, borderRight: '2px solid #bbb', borderRadius: 0, flexShrink: 0, fontSize: 8 }}>
          {project.imgLabel}
        </div>
        <div style={{ padding: '10px 12px', flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div className="wf" style={{ fontSize: 14, fontWeight: 700 }}>{project.title}</div>
            <div style={{ textAlign: 'right', flexShrink: 0 }}>
              <div className="wf" style={{ fontSize: 16, fontWeight: 700 }}>{project.metric}</div>
              <div className="wf" style={{ fontSize: 8, color: '#888' }}>{project.metricLabel}</div>
            </div>
          </div>
          <div className="mono" style={{ fontSize: 7, color: '#888', marginTop: 2 }}>{project.company} · {project.year}</div>
          <div style={{ display: 'flex', gap: 4, marginTop: 5 }}>
            {project.tags.map(t => <span key={t} className="tag" style={{ fontSize: 6 }}>{t}</span>)}
            {project.award && <span className="tag tag-award" style={{ fontSize: 6 }}>{project.award}</span>}
          </div>
        </div>
      </div>
    );
  }

  // default: image fills top 60%, minimal text below
  return (
    <div onClick={() => onOpen(project)} style={{
      border: '2px solid #333', background: '#fff', cursor: 'pointer',
      overflow: 'hidden', position: 'relative',
    }}
      onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.01)'}
      onMouseLeave={e => e.currentTarget.style.transform = ''}
    >
      <div className="img-ph" style={{ height: 110, borderBottom: '2px solid #bbb', borderRadius: 0 }}>
        {project.imgLabel}
      </div>
      <div style={{ padding: '8px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <div className="wf" style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>{project.title}</div>
          <div className="mono" style={{ fontSize: 7, color: '#888', marginTop: 2 }}>{project.company}</div>
        </div>
        <div className="wf" style={{ fontSize: 16, fontWeight: 700, textAlign: 'right', flexShrink: 0 }}>
          {project.metric}
          {project.award && <div className="tag tag-award" style={{ fontSize: 6, marginTop: 2 }}>{project.award}</div>}
        </div>
      </div>
    </div>
  );
};

// Modal overlay
const Modal = ({ project, onClose }) => {
  if (!project) return null;
  return (
    <div onClick={onClose} style={{
      position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.55)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: 20,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', border: '2px solid #333', width: '100%', maxWidth: 400,
        maxHeight: '85%', overflow: 'auto',
      }}>
        {/* Image */}
        <div className="img-ph" style={{ height: 140, borderBottom: '2px solid #bbb', borderRadius: 0, fontSize: 10 }}>
          {project.imgLabel}
        </div>
        <div style={{ padding: '14px 16px' }}>
          {/* Header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
            <div>
              <div className="wf" style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.15 }}>{project.title}</div>
              <div className="mono" style={{ fontSize: 8, color: '#888', marginTop: 3 }}>{project.company} · {project.year}</div>
            </div>
            <button onClick={onClose} style={{ border: '2px solid #333', background: '#fff', cursor: 'pointer', width: 24, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontFamily: 'monospace', flexShrink: 0 }}>×</button>
          </div>
          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 12 }}>
            {project.tags.map(t => <span key={t} className="tag" style={{ fontSize: 7 }}>{t}</span>)}
            {project.award && <span className="tag tag-award" style={{ fontSize: 7 }}>{project.award}</span>}
          </div>
          {/* Sections */}
          {[['Problem', project.problem], ['Solution', project.solution]].map(([h, b]) => (
            <div key={h} style={{ marginBottom: 10 }}>
              <div className="mono" style={{ fontSize: 8, letterSpacing: 1, textTransform: 'uppercase', color: '#888', marginBottom: 4 }}>{h}</div>
              <div className="wf" style={{ fontSize: 13, lineHeight: 1.4, color: '#333' }}>{b}</div>
            </div>
          ))}
          <div style={{ borderTop: '1.5px solid #eee', paddingTop: 10, marginTop: 4 }}>
            <div className="mono" style={{ fontSize: 8, letterSpacing: 1, textTransform: 'uppercase', color: '#888', marginBottom: 6 }}>Outcomes</div>
            {project.outcomes.map((o, i) => (
              <div key={i} style={{ display: 'flex', gap: 6, marginBottom: 4 }}>
                <span className="wf" style={{ fontSize: 13, color: '#c8a05a', fontWeight: 700, flexShrink: 0 }}>→</span>
                <span className="wf" style={{ fontSize: 13 }}>{o}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Layout B: Creative ─────────────────────────────────────────────────

// Work: image-dominant mosaic grid (first card spans full width).
// Asymmetric typography rhythm.

            <div style={{ marginTop: 8, display: 'flex', gap: 14 }}>

              <div><span className="wf" style={{ fontSize: 16, fontWeight: 700 }}>43K</span> <span className="wf" style={{ fontSize: 9, color: '#888' }}>sessions</span></div>
            </div>
          </div>
        </div>

        {/* 2-col grid for rest */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginTop: 12 }}>
          {PROJECTS.slice(1).map(p => (
            <ProjectCard key={p.id} project={p} onOpen={setActive} variant="default" />
          ))}
        </div>
      </div>

      {/* Skills dark band */}
      <div style={{ background: '#1a1a1a', padding: '22px 22px', marginTop: 0 }}>
        <SectionLabel color="#888">Skills</SectionLabel>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 10 }}>
          {['GTM Strategy','Positioning','Developer PMM','Lifecycle Comms','Sales Enablement','Data Analysis','Video Scripting','GitHub','HubSpot','Pendo'].map(s => (
            <span key={s} className="tag" style={{ fontSize: 8, background: 'transparent', borderColor: '#555', color: '#ccc' }}>{s}</span>
          ))}
        </div>
        <div style={{ marginTop: 22, paddingTop: 18, borderTop: '1px solid #333', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div className="wf" style={{ fontSize: 14, color: '#999' }}>Open to senior PMM roles in tech.</div>
          <LinkedInBtn dark />
        </div>
      </div>

      <Modal project={active} onClose={() => setActive(null)} />
    </div>
  );
};
